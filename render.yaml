services:
  - type: web
    name: nutriai-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8000
      - key: SECRET_KEY
        value: nutriai_super_secret_key_123
      - key: DATABASE_URL
        fromService:
          type: mysql
          name: nutriai-db
          property: connectionString
